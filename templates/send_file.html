<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{title}} | 传输中心</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{max-width:800px;margin:20px auto;font-family:"Microsoft Yahei",Arial;padding:0 15px;line-height:1.6;}
        h1{text-align:center;color:#222;margin-bottom:25px;font-size:24px;}
        .card{border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:20px;background:#fff;}
        .card h2{font-size:18px;color:#1f2937;margin-bottom:15px;border-left:4px solid #0066cc;padding-left:10px;}

        /* 拖拽文件区域 */
        .drop-box{
            border:2px dashed #0066cc;
            border-radius:10px;
            padding:40px 20px;
            text-align:center;
            cursor:pointer;
            background:#f8fafc;
            transition:all 0.2s;
        }
        .drop-box.active{background:#e6f0ff;border-color:#0052a3;}
        .drop-box p{color:#666;margin-top:8px;}
        .file-tip{margin-top:12px;text-align:center;color:#2c3e50;font-weight:bold;}
        input[type="file"]{display:none;}

        /* 按钮样式 */
        .btn{
            background:#0066cc;color:#fff;border:none;
            padding:10px 20px;border-radius:6px;
            cursor:pointer;font-size:14px;margin:6px 4px;
        }
        .btn:hover{background:#0052a3;}
        .btn:disabled{background:#94a3b8;cursor:not-allowed;}

        .del-btn{
            background:#dc3545;
            padding:6px 10px;
            font-size:12px;
        }
        .del-btn:hover{background:#b02a37;}

        .row{margin:12px 0;}
        .gray-text{color:#666;font-size:14px;}
        .red{color:red;}
        .green{color:green;}

        /* 进度条 */
        .progress{width:100%;height:10px;background:#eee;border-radius:5px;margin:15px 0;overflow:hidden;}
        .progress-bar{height:100%;background:#28a745;width:0%;transition:0.2s;}

        .item{padding:10px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
        .expire{color:#999;font-size:13px;}
        a{color:#0066cc;text-decoration:none;}
        .back{margin-top:20px;display:inline-block;color:#666;}
    </style>
</head>
<body>
    <h1>📁 传输中心</h1>

    <!-- 统一文件选择区 -->
    <div class="card">
        <h2>第一步：选择 / 拖拽文件</h2>
        <div id="dropBox" class="drop-box">
            <div>点击此处 或 拖拽文件到这里</div>
            <p>支持任意格式文件</p>
            <input type="file" id="fileInput" multiple>
        </div>
        <div class="file-tip" id="fileTip"></div>

        <div style="text-align:center;margin-top:18px;">
            <button class="btn" onclick="sendP2P()" disabled id="btnP2P">📡 发给对方(面对面)</button>
            <button class="btn" onclick="uploadTemp()" id="uploadTempBtn">☁️ 上传临时暂存(1小时)</button>
        </div>
    </div>

    <!-- 面对面P2P区域 -->
    <div class="card">
        <h2>第二步：面对面直传设置</h2>
        <div class="row">
            <button class="btn" onclick="joinP2P()">1. 加入在线</button>
            <button class="btn" onclick="refreshPeers()">2. 刷新在线好友</button>
        </div>
        <div class="row gray-text" id="peerList">在线列表：暂无</div>

        <div class="row" style="margin-top:15px;">
            <label>选择对方ID：</label>
            <select id="targetPeer" style="padding:6px;border-radius:4px;border:1px solid #ccc;"></select>
            <button class="btn" onclick="connectPeer()">3. 发起连接</button>
        </div>

        <div class="row" id="connStatus" class="red">连接状态：未连接</div>

        <div class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="recvList"></div>
    </div>

    <!-- 临时暂存列表 -->
    <div class="card">
        <h2>临时暂存文件列表（1小时自动过期）</h2>
        <button class="btn" onclick="refreshTempList()">刷新列表</button>
        <div id="fileList" style="margin-top:15px;"></div>
    </div>

    <a href="/" class="back">← 返回首页</a>

<script>
let myUid = "";
let pc = null;
let dataChannel = null;
let targetUid = "";
const CHUNK_SIZE = 64*1024;

let sendFile = null;
let fileOffset = 0;
let recvMeta = null;
let recvBuffer = [];

// 防重复上传限制
let isUploading = false;
let lastUploadTime = 0;
const UPLOAD_COOLDOWN = 3000; // 3秒冷却

// 拖拽选文件
const dropBox = document.getElementById('dropBox');
const fileInput = document.getElementById('fileInput');
const fileTip = document.getElementById('fileTip');

dropBox.onclick = () => fileInput.click();

['dragenter','dragover','dragleave','drop'].forEach(e=>dropBox.addEventListener(e,ev=>ev.preventDefault()));
dropBox.addEventListener('dragover',()=>dropBox.classList.add('active'));
dropBox.addEventListener('dragleave',()=>dropBox.classList.remove('active'));
dropBox.addEventListener('drop',e=>{
    dropBox.classList.remove('active');
    fileInput.files = e.dataTransfer.files;
    showFileInfo();
});
fileInput.onchange = showFileInfo;

function showFileInfo(){
    if(fileInput.files.length>0){
        fileTip.innerText = `已选中：${fileInput.files[0].name}`;
    }else{
        fileTip.innerText = '';
    }
}

window.onload = function(){
    refreshTempList();
};

// 临时暂存
async function refreshTempList(){
    let res = await fetch("/temp/list");
    let json = await res.json();
    let listDom = document.getElementById("fileList");
    listDom.innerHTML = "";
    if(json.list.length === 0){
        listDom.innerHTML = "<div class='item'>暂无临时文件</div>";
        return;
    }
    json.list.forEach(item=>{
        let div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
            <span>${item.name}</span>
            <div>
                <span class="expire">剩余 ${item.left_min}分${item.left_sec}秒</span>
                <a href="/temp/download/${item.fid}" target="_blank" style="margin-left:10px;">下载</a>
                <button class="btn del-btn" onclick="deleteTempFile('${item.fid}')">删除</button>
            </div>
        `;
        listDom.appendChild(div);
    });
}

// 删除临时文件
async function deleteTempFile(fid){
    if(!confirm("确定删除此文件？")) return;
    let res = await fetch(`/temp/delete/${fid}`, {
        method: "POST"
    });
    let data = await res.json();
    if(data.code === 0){
        alert("删除成功");
    }else{
        alert("删除失败："+data.msg);
    }
    refreshTempList();
}

async function uploadTemp(){
    // 防重复 + 冷却限制
    if(isUploading){
        alert("正在上传中，请勿重复点击！");
        return;
    }
    let now = Date.now();
    if(now - lastUploadTime < UPLOAD_COOLDOWN){
        alert("上传过于频繁，请稍后再试！");
        return;
    }
    if(fileInput.files.length === 0){
        alert("请先选择或拖拽文件！");
        return;
    }

    const btn = document.getElementById("uploadTempBtn");
    try {
        isUploading = true;
        btn.disabled = true;
        btn.innerText = "上传中...";

        for(let f of fileInput.files){
            let fd = new FormData();
            fd.append("file", f);
            await fetch("/temp/upload", {method:"POST", body:fd});
        }
        fileInput.value = "";
        fileTip.innerText = "";
        refreshTempList();
        alert("上传成功！");
        lastUploadTime = Date.now();
    }finally{
        isUploading = false;
        btn.disabled = false;
        btn.innerText = "☁️ 上传临时暂存(1小时)";
    }
}

// P2P 逻辑完全原样不动
async function joinP2P(){
    let r = await fetch("/p2p/join");
    let j = await r.json();
    myUid = j.uid;
    alert("你的在线ID：" + myUid);
    refreshPeers();
}

async function refreshPeers(){
    let r = await fetch("/p2p/list");
    let j = await r.json();
    document.getElementById("peerList").innerText = "在线列表：" + j.list.join(" | ");
    let sel = document.getElementById("targetPeer");
    sel.innerHTML = "";
    j.list.forEach(u=>{
        if(u!==myUid) {
            let opt = document.createElement("option");
            opt.value=u; opt.innerText=u;
            sel.appendChild(opt);
        }
    });
}

async function connectPeer(){
    targetUid = document.getElementById("targetPeer").value;
    if(!targetUid) return alert("请先选择对方ID");

    pc = new RTCPeerConnection({iceServers:[]});

    pc.onicecandidate = async e => {
        if(e.candidate){
            await sendSignal({type:"candidate", candidate:e.candidate.toJSON()});
        }
    };

    pc.ondatachannel = e => {
        dataChannel = e.channel;
        setupDC();
    };

    dataChannel = pc.createDataChannel("file");
    setupDC();

    const isInitiator = myUid < targetUid;
    if(isInitiator){
        let offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await sendSignal({type:"offer", sdp:pc.localDescription.toJSON()});
    }
    loopSignal();
}

async function sendSignal(data){
    await fetch("/p2p/signal/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({to:targetUid, ...data})
    });
}

async function loopSignal(){
    while(true){
        let res = await fetch("/p2p/signal/recv");
        let data = await res.json();
        if(!data.type) { 
            await new Promise(r=>setTimeout(r,500)); 
            continue; 
        }
        if(data.type === "offer"){
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            let ans = await pc.createAnswer();
            await pc.setLocalDescription(ans);
            await sendSignal({type:"answer", sdp:pc.localDescription.toJSON()});
        }
        else if(data.type === "answer"){
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        }
        else if(data.type === "candidate"){
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
    }
}

function setupDC(){
    dataChannel.onopen = ()=>{
        let statusDom = document.getElementById("connStatus");
        statusDom.innerText = "✅ 连接成功，可以发送文件";
        statusDom.className = "row green";
        document.getElementById("btnP2P").disabled = false;
    };
    dataChannel.onclose = ()=>{
        let statusDom = document.getElementById("connStatus");
        statusDom.innerText = "❌ 连接已断开";
        statusDom.className = "row red";
        document.getElementById("btnP2P").disabled = true;
    };
    dataChannel.onmessage = onMsg;
}

function sendP2P(){
    let f = fileInput.files[0];
    if(!f) return alert("请先选择文件！");
    sendFile = f; 
    fileOffset = 0;
    dataChannel.send(JSON.stringify({type:"meta", name:f.name, size:f.size}));
    nextChunk();
}

function nextChunk(){
    if(fileOffset >= sendFile.size) return;
    let blob = sendFile.slice(fileOffset, fileOffset + CHUNK_SIZE);
    blob.arrayBuffer().then(buf=>{
        dataChannel.send(buf);
        fileOffset += CHUNK_SIZE;
        let pct = (fileOffset / sendFile.size * 100).toFixed(0);
        document.getElementById("progressBar").style.width = pct + "%";
        nextChunk();
    });
}

function onMsg(e){
    if(typeof e.data === "string"){
        let j = JSON.parse(e.data);
        if(j.type === "meta"){
            recvMeta = j;
            recvBuffer = [];
            alert("开始接收文件：" + j.name);
        }
    } else {
        recvBuffer.push(e.data);
        let loaded = recvBuffer.length * CHUNK_SIZE;
        let pct = Math.min(100, (loaded / recvMeta.size * 100));
        document.getElementById("progressBar").style.width = pct + "%";
        if(loaded >= recvMeta.size){
            let url = URL.createObjectURL(new Blob(recvBuffer));
            let a = document.createElement("a");
            a.href = url;
            a.download = recvMeta.name;
            a.innerText = "📥 下载 " + recvMeta.name;
            document.getElementById("recvList").appendChild(document.createElement("br"));
            document.getElementById("recvList").appendChild(a);
            recvMeta = null;
            recvBuffer = [];
        }
    }
}
</script>

</body>
</html>
